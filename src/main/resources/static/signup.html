<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>회원가입</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<section class="card">
  <div class="logo-wrap">
    <div class="logo">
      <img src="logo.png" alt="로고" />
    </div>
  </div>

  <!-- 🔹 id 추가 -->
  <form class="form" id="signupForm" autocomplete="on">
    <h1 class="title">회원가입하고 시작해볼까요?</h1>
    <p class="hint">간단한 정보만 입력하면 AI로 영어 공부를 시작할 수 있어요.</p>

    <div class="stack">
      <div class="field">
        <label for="uid">ID</label>
        <input id="uid" name="id" type="text" placeholder="사용하실 아이디" required />
      </div>

      <div class="field">
        <label for="upw">PASSWORD</label>
        <input id="upw" name="password" type="password" placeholder="비밀번호" required />
      </div>

      <div class="field">
        <label for="unick">NICKNAME</label>
        <input id="unick" name="nickname" type="text" placeholder="닉네임" required />
      </div>

      <div class="actions">
        <button class="btn btn-primary" type="submit">회원가입</button>
        <a class="btn btn-ghost" href="index.html">로그인으로 돌아가기</a>
      </div>
    </div>
  </form>
</section>
<script src="script.js"></script>
</body>
</html>
