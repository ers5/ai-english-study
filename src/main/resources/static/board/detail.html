<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>게시글 상세</title>
  <link rel="stylesheet" href="board.css">
  <link rel="stylesheet" href="write.css">
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-mark">AI</div>
    <div class="brand-name">영어 학습</div>
  </div>

  <div class="top-actions">
    <a href="board.html" class="btn ghost">&lt; 게시판으로</a>
  </div>
</div>

<div class="page">
  <div class="card detail-box">
    
    <h1 class="detail-title">제목 불러오는 중...</h1>
    <div class="detail-meta">
      <span class="detail-writer">작성자: —</span>
      <span class="detail-date">날짜: —</span>
    </div>

    <div class="detail-content">내용을 불러오는 중...</div>

    <hr class="line">

    <h3 class="reply-title">댓글</h3>

    <div class="reply-list">
      <!-- 댓글 목록 자동 생성 -->
    </div>

    <div class="reply-write-box">
      <textarea class="reply-input" placeholder="댓글을 입력하세요"></textarea>
      <button class="btn primary reply-submit">댓글 등록</button>
    </div>

  </div>
</div>

<script type="module" src="detail.js"></script>
</body>
</html>
