<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>오답노트 · 영어 해석</title>
  <link rel="stylesheet" href="wrongnote.css" />
</head>
<body>
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">📝</div>
    <span class="brand-name">오답노트</span>
  </div>
  <nav class="top-actions">
    <a class="btn ghost" href="#">마이페이지로</a>
    <div class="btn-group">
      <!-- JS에서 활성화하는 버튼 -->
      <a class="btn secondary" href="#">문장 불러오기</a>
    </div>
  </nav>
</header>

<main class="page">
  <section class="intro card">
    <h1 class="title">영어 문장 해석 연습</h1>
    <p class="subtitle">오답을 불러오고, 아래 입력칸에 해석을 작성한 뒤 채점하세요.</p>
    <div class="tips">
    </div>
  </section>

  <!-- 오답 리스트: JS에서 동적으로 렌더링 -->
  <section class="list">
    <!-- JS가 /api/wrongnotes 결과로 <article class="note card">들을 채운다 -->
  </section>

  <section class="summary card">
    <div class="sum-right">
      <div class="kpis">
        <div class="kpi" data-kpi="remaining">
          <div class="kpi-num">—</div>
          <div class="kpi-lab">아직 오답 수</div>
        </div>
        <div class="kpi" data-kpi="rate">
          <div class="kpi-num">—%</div>
          <div class="kpi-lab">오답 맞춘 비율</div>
        </div>
        <div class="kpi" data-kpi="total">
          <div class="kpi-num">—</div>
          <div class="kpi-lab">총 오답 수</div>
        </div>
      </div>
    </div>
  </section>
</main>

<a href="#" class="back-fab" aria-label="메뉴로 돌아가기">
  <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
    <path d="M15 18l-6-6 6-6" fill="currentColor"/>
  </svg>
  메뉴로
</a>
<!-- 메뉴로 플로팅 버튼 -->

<script type="module" src="wrongnote.js"></script>
</body>
</html>
